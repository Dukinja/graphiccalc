<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>duke's graphing calculator js version</title>
    <style>
        :root {
            --accent: #00d4ff;
            --bg: #0a0e14;
            --panel: #16212e;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Top UI Panel */
        #ui-layer {
            background: var(--panel);
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        label {
            font-weight: bold;
            color: var(--accent);
            font-size: 1.2rem;
        }
        input {
            background: #05080a;
            border: 1px solid #334a5e;
            color: var(--accent);
            padding: 10px 15px;
            font-size: 1.2rem;
            border-radius: 5px;
            flex-grow: 1;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
        }
        canvas {
            flex-grow: 1;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <label>f(x) = </label>
        <input type="text" id="mathInput" placeholder="e.g. x**2 + 3*x + 2" autocomplete="off">
    </div>

    <canvas id="screen"></canvas>

    <script>
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const mathInput = document.getElementById('mathInput');

        let equation = "";
        let cx, cy;
        const step = 60; // Slightly larger zoom for visibility
        let cached_points = [];

		function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.clientWidth * dpr;
            canvas.height = canvas.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            
            cx = canvas.clientWidth / 2;
            cy = canvas.clientHeight / 2;
            
            updateGraph(); // ADD THIS LINE HERE
            render();
        }

        function sanitizeMath(str) {
            // Logic: 3x -> 3*x, x2 -> x**2, ^ -> **
            let s = str.replace(/(\d)x/g, "$1*x");
            s = s.replace(/x(\d)/g, "x**$1");
            s = s.replace(/\^/g, "**");
            return s.toLowerCase();
        }

        function updateGraph() {
            cached_points = [];
            equation = mathInput.value;
            if (!equation) return;

            try {
                const clean = sanitizeMath(equation);
                const f = new Function('x', `return ${clean}`);

                // Calculate points from left to right edge of screen
                const mathRange = (canvas.clientWidth / 2) / step;
                for (let x = -mathRange; x <= mathRange; x += 0.05) {
                    let y = f(x);
                    if (typeof y === 'number' && isFinite(y)) {
                        cached_points.push({
                            x: cx + (x * step),
                            y: cy - (y * step)
                        });
                    }
                }
            } catch (e) { /* Invalid math string - ignore */ }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Grid Lines
            ctx.strokeStyle = "rgba(0, 212, 255, 0.05)";
            ctx.lineWidth = 1;
            
            // MATH FIX: Use floor to prevent generating coords outside the visible buffer
            const ticksX = Math.floor(cx / step);
            const ticksY = Math.floor(cy / step);

            for(let i = -ticksX; i <= ticksX; i++) {
                let x = cx + i * step;
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let i = -ticksY; i <= ticksY; i++) {
                let y = cy + i * step;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // 2. Draw Main Axes
            ctx.strokeStyle = "#00d4ff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(canvas.clientWidth, cy);
            ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.clientHeight);
            ctx.stroke();

            // 3. Draw Ticks and Numbers (With Safe Zones)
            ctx.fillStyle = "#00d4ff";
            ctx.font = "14px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const edgePadding = 40; // Pixels from the edge to keep clear for axis labels

            // X-Axis Markings
            for (let i = -ticksX; i <= ticksX; i++) {
                if (i === 0) continue;
                let x = cx + i * step;
                
                // Bounds Check: Don't draw if it overlaps the screen edges
                if (x < edgePadding || x > canvas.clientWidth - edgePadding) continue;

                ctx.beginPath();
                ctx.moveTo(x, cy - 5);
                ctx.lineTo(x, cy + 5);
                ctx.stroke();
                ctx.fillText(i, x, cy + 20);
            }

            // Y-Axis Markings
            ctx.textAlign = "right";
            for (let i = -ticksY; i <= ticksY; i++) {
                if (i === 0) continue;
                let y = cy - i * step; 
                
                // Bounds Check: Don't draw if it overlaps the top or bottom edges
                if (y < edgePadding || y > canvas.clientHeight - edgePadding) continue;

                ctx.beginPath();
                ctx.moveTo(cx - 5, y);
                ctx.lineTo(cx + 5, y);
                ctx.stroke();
                ctx.fillText(i, cx - 12, y);
            }

            ctx.fillText("0", cx - 8, cy + 15);

            // 4. Draw Axis Labels (Dynamically clamped to the frame limits)
            ctx.font = "bold 20px monospace";
            ctx.fillStyle = "#00d4ff";
            
            // x (Far Right)
            ctx.textAlign = "right";
            ctx.fillText("x", canvas.clientWidth - 15, cy - 15);
            
            // x' (Far Left)
            ctx.textAlign = "left";
            ctx.fillText("x'", 15, cy - 15);
            
            // y (Top)
            ctx.textAlign = "left";
            ctx.fillText("y", cx + 15, 25);
            
            // y' (Bottom)
            ctx.textAlign = "left";
            ctx.fillText("y'", cx + 15, canvas.clientHeight - 15);

            // 5. Draw the Graph
            if (cached_points.length > 1) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#00d4ff";
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cached_points[0].x, cached_points[0].y);
                for (let i = 1; i < cached_points.length; i++) {
                    ctx.lineTo(cached_points[i].x, cached_points[i].y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0; 
            }
        }

		// THIS IS THE MISSING LINK! 
        // It tells JS to update the graph every time you press a key.
        mathInput.addEventListener('input', () => {
            updateGraph();
            render();
        });

        window.addEventListener('resize', resize);
        
        // Initial setup
        resize();
    </script>
</body>
</html>
